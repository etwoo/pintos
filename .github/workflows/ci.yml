name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  # required by cpp-linter/cpp-linter-action@v2 for files-changed-only: false
  contents: read

jobs:
  build-all:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        project: [ threads, userprog, vm, filesys ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qqy gcc-14-i686-linux-gnu qemu-system-x86 bochsbios vgabios
    - name: Build Bochs from source because Ubuntu's package lacks nogui
      run: |
        curl -Lo bochs.tgz https://github.com/bochs-emu/Bochs/archive/refs/tags/REL_3_0_FINAL.tar.gz
        tar zxf bochs.tgz
        cd Bochs-*/bochs
        ./configure --prefix=/usr --with-nogui
        sed -i 's/bx_print_header();//g' main.cc
        make -j$(nproc)
        sudo make install
        sudo ln -s /usr/share/bochs/VGABIOS-lgpl-latest{,.bin}
    - name: Kludge compiler toolchain executable names
      run: |
        sudo ln -s /usr/bin/i686-linux-gnu-gcc-14 /usr/bin/i686-elf-gcc
        for tool in ld objcopy ar ranlib ; do
          sudo ln -s /usr/bin/i686-linux-gnu-$tool /usr/bin/i686-elf-$tool
        done
    - name: Build
      run: make -C src/${{ matrix.project }}
    - name: Test
      run: |
        export PATH="$PATH:$PWD/src/utils"
        make check -C src/${{ matrix.project }}

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run clang-format
      id: lint
      uses: cpp-linter/cpp-linter-action@v2
      with:
        style: 'file'     # use .clang-format
        version: 22       # use clang-format-22
        tidy-checks: '-*' # do not run clang-tidy
        files-changed-only: false
        file-annotations: true
        step-summary: true
    - name: Fail job if clang-format found problems
      if: steps.lint.outputs.checks-failed > 0
      run: exit 1